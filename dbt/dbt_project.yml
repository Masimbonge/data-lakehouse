# dbt project config

name: 'modern_data_lakehouse'
version: '2.0.0'
config-version: 2
profile: 'masimbonge_lakehouse'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

models:
  masimbonge_lakehouse:
    staging:
      +materialized: view             # Staging models are views (fast, no storage cost)
      +schema: staging
    marts:
      +materialized: table            # Mart models are tables (fast queries)
      +schema: marts

vars:
  start_date: '2026-01-01'
